<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <h1 style="text-align: center; margin-top: 20px;">TO DO APP</h1>
    <div class="input-text">

        <input type="text" class="form-control" id="taskInput" placeholder="Enter a new task">
        <button id="addBtn" class="btn btn-primary">Add</button>
    </div>
    <div id="taskList">
        <div style="display: flex;  border-radius: 8px; margin: 16px;   ">
            <div style="color: white; background-color: black; width: 25%; border-right: 2px solid rgb(250, 250, 250); padding: 4px 30px;" class="asd">Task</div>
            <div style="color: white; background-color: black; width: 25%; border-right: 2px solid rgb(250, 250, 250); padding: 4px 30px;">Item Add</div>
            <div style="color: white; background-color: black; width: 25%; border-right: 2px solid rgb(250, 250, 250); padding: 4px 30px;">Action</div>
        </div>
    </div>
    <script src="test.js"></script>
</body>

</html>
