<div class="container mt-4">
  <h1 class="text-center mb-4">Now Playing</h1>
  <div class="row">
    @for (nowPlaying of nowPlaying().slice(0, 12); track nowPlaying.id) {
      <div class="col-lg-2 col-md-3 col-sm-4 mb-1">
        <div class="card h-100 shadow-sm">
          <img
            [src]="'https://image.tmdb.org/t/p/w300' + nowPlaying.poster_path"
            class="card-img"
            alt="movie"
          />

          <div class="card-body text-center">
            <h5 class="card-title">{{ nowPlaying.title }}</h5>
            <p class="card-text">{{ nowPlaying.vote_average }}</p>
            <p class="card-text text-muted">{{ nowPlaying.release_date }}</p>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="d-flex justify-content-center align-items-center gap-3 mt-4">
    
     <button class="btn btn-primary" (click)="goToFirstPage()">First</button>
    <button class="btn btn-primary" (click)="prevPage()">Previous</button>

    <span>Page {{ currentPage() }} / {{ totalPages() }}</span>

    <button class="btn btn-primary" (click)="nextPage()">Next</button>

     <button class="btn btn-primary" (click)="goToLastPage()">Last</button>
  </div>
</div>
