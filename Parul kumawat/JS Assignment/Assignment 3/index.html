<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <div class="container1">
        <form>
            <h1> Signup Form</h1>


            <div class="form-steps">

                <div class="steps-name">
                   

                        <div class="name">
                             <p>Name</p>
                        </div>
                       <div class="contact">
                        <p>Contact</p>
                       </div>
                        
                       <div class="birth">
                        <p>Birth</p>
                       </div>
                        
                       <div class="submit">
                         <p>Submit</p>
                       </div>
                       
                   

                </div>

                    <div class="step-no">
                            <div class="first">
                                <p class="step active"> &#10004;</p>
                            </div>
                            
                            <div class="check">
                                 <p class="step">&#10004;</p>
                            </div>
                           
                            <div class="check">
                                <p class="step">&#10004;</p>
                            </div>
                            
                            <div class="check">
                                 <p class="step">&#10004;</p>
                            </div>
                           
                    </div>
                



                <div class="form-info">

                    <h1>Basic Info:</h1>
                    <div class="form">
                    <label for ="fname">First Name:</label><br>
                    <input type="text" id="fname" name="fname" required><br>

                     <label for ="lname">Last Name:</label><br>
                    <input type="text" id="lname" name="lname" required ><br>

                    <button type="button" class="next">Next</button>
                        </div>
                </div>
            


             <div class="form-info-2">
            <h2>Contact Info</h2>
             <label for ="email">Email Address:</label><br>
                <input type="email" id="email" name="email" required><br>

                 <label for ="number">Phone Number</label><br>
             <input type="text" id="number" name="number" required><br>
            <button type="button" class="prev">Previous</button>
        <button type="button" class="next">Next</button>
        </div>


        <div class="form-info-3">
            <h2>Date Of Birth</h2>
             <label for ="date">Date:</label><br>
            <input type="date" id="date" name="date" required><br>
             <label for ="gender">Gender:</label><br>
             <select id="gender" name="gender" required>
            <option>Male</option>
            <option>Female</option>
        </select><br>
            <button type="button" class="prev">Previous</button>
        <button type="button" class="next">Next</button>
        </div>


            <div class="form-info-4">
            <h2>Login Details:</h2>
             <label for ="username">Username:</label><br>
                <input type="text" id="username" name="uname" required><br>

                 <label for ="pass">Password:</label><br>
             <input type="text" id="userPass" name="upass" pattern=".{8}" required><br>
            <button type="button" class="prev">Previous</button>
        <button type="submit" class="next">Submit</button>

        <p id="msg">Form submitted successfully</p>
        </div>

            </div>
        
        
        </form>





    </div>

    <script src="script.js">

    </script>
</body>
</html>
